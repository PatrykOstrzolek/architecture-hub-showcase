services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_OWNER}/architecture-hub-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8080"
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?serverVersion=16&charset=utf8
      DEFAULT_URI: ${DEFAULT_URI}
      LOCK_DSN: flock
      SEAL_DSN: loupe:///var/www/html/var/indexes
      NEXT_REVALIDATE_URL: ${NEXT_REVALIDATE_URL}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      PREVIEW_SECRET: ${PREVIEW_SECRET}
    mem_limit: 768m
    volumes:
      - uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads:
