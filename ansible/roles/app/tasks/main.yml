- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Log in to GHCR
  community.docker.docker_login:
    registry: ghcr.io
    username: "{{ ghcr_owner }}"
    password: "{{ vault_ghcr_token }}"

- name: Deploy docker-compose file
  copy:
    src: "{{ playbook_dir }}/../../docker-compose.prod.yml"
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Template .env file
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

- name: Deploy and recreate services with latest image
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    pull: always
    recreate: always
    state: present
    remove_orphans: true
