- name: Create application directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Log in to GHCR
  community.docker.docker_login:
    registry: ghcr.io
    username: "{{ ghcr_owner }}"
    password: "{{ vault_ghcr_token }}"

- name: Deploy docker-compose file
  copy:
    src: "{{ playbook_dir }}/../../docker-compose.prod.yml"
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Template .env file
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

- name: Prune unused Docker images to free disk space
  community.docker.docker_prune:
    images: true
    images_filters:
      dangling: false

- name: Deploy and recreate services with latest image
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    pull: always
    recreate: always
    state: present
    remove_orphans: true

- name: Wait for backend to respond
  uri:
    url: http://127.0.0.1:8000/admin/
    status_code: [200, 301, 302]
    follow_redirects: none
  register: _health
  until: _health.status in [200, 301, 302]
  retries: 12
  delay: 5

- name: Warm Symfony cache
  command: >
    docker exec architecture-hub-backend-1
    php -d memory_limit=1G bin/console cache:warmup --env=prod
  become_user: "{{ app_user }}"
