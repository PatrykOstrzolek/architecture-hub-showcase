name: CD — Backend

on:
  workflow_run:
    workflows: [CI — Backend]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/architecture-hub-backend

jobs:
  build-and-push:
    name: Build & push backend image
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lowercase image name
        run: echo "BACKEND_IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/architecture-hub-backend" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,priority=700
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest

  deploy-backend:
    name: Deploy backend via Ansible
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Ansible
        run: pip install "ansible-core==2.17.*"

      - name: Install community.docker collection
        run: ansible-galaxy collection install "community.docker:==3.13.0"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p 10130 "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Write Ansible vault password
        env:
          VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: printf '%s' "$VAULT_PASSWORD" > ~/.vault_pass

      - name: Lowercase owner for GHCR
        run: echo "GHCR_OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Write Ansible vault file
        env:
          VAULT_FILE: ${{ secrets.ANSIBLE_VAULT_FILE }}
        run: echo "$VAULT_FILE" > ansible/group_vars/all/vault.yml

      - name: Run deploy playbook
        run: >
          ansible-playbook playbooks/deploy.yml
          --inventory inventory/production.ini
          --vault-password-file ~/.vault_pass
          --extra-vars "ansible_host=${{ secrets.PRODUCTION_HOST }} image_tag=${{ needs.build-and-push.outputs.image_tag }} ghcr_owner=${{ env.GHCR_OWNER_LC }}"
        working-directory: ${{ github.workspace }}/ansible
