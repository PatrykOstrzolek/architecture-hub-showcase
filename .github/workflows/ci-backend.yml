name: CI — Backend

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_mysql, opcache
          coverage: none
          ini-values: memory_limit=1G

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --configuration=phpstan.ci.neon --no-progress

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Create stub .env for tests
        run: touch .env

      - name: PHPUnit
        run: php vendor/bin/phpunit tests/Unit
        env:
          APP_ENV: test

      - name: Security audit
        run: composer audit
