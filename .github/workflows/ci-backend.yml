name: CI — Backend

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: intl, pdo_pgsql, opcache
          coverage: none
          ini-values: memory_limit=1G

      - name: Cache Composer packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Cache PHPStan result cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: backend/var/cache/.phpstan.result.cache
          key: phpstan-${{ hashFiles('backend/composer.lock', 'backend/phpstan.ci.neon') }}
          restore-keys: phpstan-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: PHPStan
        run: php vendor/bin/phpstan analyse --configuration=phpstan.ci.neon --no-progress

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Create stub .env for tests
        run: touch .env

      - name: PHPUnit
        run: php vendor/bin/phpunit tests/Unit
        env:
          APP_ENV: test

      - name: Security audit
        run: composer audit
