name: CI — Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: backend/var,backend/vendor,frontend/node_modules,.next
          exit-code: 1

      - name: Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/php \
            --config p/typescript \
            --error \
            --quiet
