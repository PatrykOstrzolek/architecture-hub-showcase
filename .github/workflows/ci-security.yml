name: CI — Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: backend/var,backend/vendor,frontend/node_modules,.next
          exit-code: 1

      - name: Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/php \
            --config p/typescript \
            --error \
            --quiet
