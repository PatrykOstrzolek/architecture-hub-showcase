# Local dev only. The serversideup/php base image ships a hardening rule
# (server-opts.d/security.conf) that denies all dotfile paths:
#   location ~ /\.(?!well-known) { deny all; }
# Sulu's homepage content route is requested as `/.json`, which starts with
# a dot right after the leading slash and gets caught by that rule. An exact
# `location =` always takes priority over regex locations in nginx, so this
# carves out just that one path without touching the vendored rule above.
# Production (ansible/roles/nginx/templates/app.conf.j2) uses an explicit
# allowlist instead and is not affected by this issue.
location = /.json {
    try_files $uri $uri/ /index.php?$query_string;
}
